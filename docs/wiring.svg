<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" rx="12" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" fill="#4ecca3">Hardware Wiring Diagram | 硬件接线图</text>

  <!-- STM32 Blue Pill -->
  <g transform="translate(140, 160)">
    <rect x="0" y="0" width="160" height="240" rx="6" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
    <text x="80" y="22" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff" font-weight="bold">STM32F103C8T6</text>
    <text x="80" y="38" text-anchor="middle" font-family="Arial" font-size="8" fill="#a0b0d0">Blue Pill | 最小系统板</text>

    <!-- Pins left side -->
    <g font-family="Consolas, monospace" font-size="7" fill="#d0d0e0">
      <text x="8" y="65">PA0  → Buzzer</text>
      <text x="8" y="75">PA1  → LDR</text>
      <text x="8" y="85">PA2  → NTC</text>
      <text x="8" y="95">PA3  → Joy X</text>
      <text x="8" y="105">PA4  → Joy Y</text>
      <text x="8" y="115">PA5  → Joy SW</text>
      <text x="8" y="125">PA6  → TRIG</text>
      <text x="8" y="135">PA7  → ECHO</text>
      <text x="8" y="145">PA8  → OLED2 SCL</text>
      <text x="8" y="155">PA9  → OLED2 SDA</text>
      <text x="8" y="175" fill="#666">PA13 → SWDIO</text>
      <text x="8" y="185" fill="#666">PA14 → SWCLK</text>
    </g>

    <!-- Pins right side -->
    <g font-family="Consolas, monospace" font-size="7" fill="#d0d0e0">
      <text x="100" y="65">PB0  → Button1</text>
      <text x="100" y="75">PB1  → Button2</text>
      <text x="100" y="85">PB3  → OLED1 SCL</text>
      <text x="100" y="95">PB4  → OLED1 SDA</text>
    </g>
  </g>

  <!-- Main OLED 128x64 -->
  <g transform="translate(400, 160)">
    <rect x="0" y="0" width="100" height="60" rx="3" fill="#111" stroke="#27ae60" stroke-width="1.5"/>
    <text x="50" y="30" text-anchor="middle" font-family="Arial" font-size="7" fill="#27ae60">1.3" OLED</text>
    <text x="50" y="42" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">128×64</text>
    <!-- Wires -->
    <line x1="-130" y1="45" x2="0" y2="45" stroke="#4ecca3" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <text x="-65" y="42" font-family="Arial" font-size="6" fill="#4ecca3" text-anchor="middle">PB3/PB4 I2C</text>
  </g>

  <!-- Secondary OLED v2 -->
  <g transform="translate(550, 160)">
    <rect x="0" y="0" width="80" height="40" rx="3" fill="#111" stroke="#27ae60" stroke-width="1.5"/>
    <text x="40" y="20" text-anchor="middle" font-family="Arial" font-size="6" fill="#27ae60">0.91" OLED</text>
    <text x="40" y="30" text-anchor="middle" font-family="Arial" font-size="5" fill="#666">128×32</text>
    <line x1="-25" y1="20" x2="0" y2="20" stroke="#4ecca3" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  </g>

  <!-- Joystick -->
  <g transform="translate(400, 280)">
    <rect x="0" y="0" width="70" height="50" rx="4" fill="#1a1a3e" stroke="#e67e22" stroke-width="1.5"/>
    <text x="35" y="18" text-anchor="middle" font-family="Arial" font-size="7" fill="#e67e22">Joystick</text>
    <text x="35" y="30" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">摇杆</text>
    <circle cx="35" cy="40" r="4" fill="#444"/>
  </g>

  <!-- Ultrasonic -->
  <g transform="translate(550, 280)">
    <rect x="0" y="0" width="90" height="50" rx="4" fill="#1a1a3e" stroke="#e94560" stroke-width="1.5"/>
    <text x="45" y="18" text-anchor="middle" font-family="Arial" font-size="7" fill="#e94560">HC-SR04</text>
    <text x="45" y="30" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">超声波</text>
    <!-- Two circles for eyes -->
    <circle cx="35" cy="42" r="4" fill="#444"/>
    <circle cx="55" cy="42" r="4" fill="#444"/>
  </g>

  <!-- Buzzer -->
  <g transform="translate(400, 360)">
    <rect x="0" y="0" width="60" height="40" rx="3" fill="#1a1a3e" stroke="#e94560" stroke-width="1.5"/>
    <text x="30" y="24" text-anchor="middle" font-family="Arial" font-size="7" fill="#e94560">Buzzer</text>
  </g>

  <!-- Sensors -->
  <g transform="translate(550, 360)">
    <rect x="0" y="0" width="90" height="40" rx="3" fill="#1a1a3e" stroke="#e67e22" stroke-width="1.5"/>
    <text x="45" y="18" text-anchor="middle" font-family="Arial" font-size="7" fill="#e67e22">LDR + NTC</text>
    <text x="45" y="30" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">光敏 + 热敏</text>
  </g>

  <!-- Buttons -->
  <g transform="translate(140, 360)">
    <rect x="0" y="0" width="70" height="40" rx="3" fill="#1a1a3e" stroke="#e67e22" stroke-width="1.5"/>
    <text x="35" y="24" text-anchor="middle" font-family="Arial" font-size="7" fill="#e67e22">PB0 + PB1</text>
    <text x="35" y="36" text-anchor="middle" font-family="Arial" font-size="6" fill="#666">Buttons 按键</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 420)">
    <rect x="0" y="0" width="4" height="20" fill="#4ecca3"/>
    <text x="10" y="14" font-family="Arial" font-size="8" fill="#888">I2C / GPIO    </text>
    <rect x="90" y="0" width="4" height="20" fill="#e67e22"/>
    <text x="100" y="14" font-family="Arial" font-size="8" fill="#888">ADC / Input</text>
    <rect x="175" y="0" width="4" height="20" fill="#e94560"/>
    <text x="185" y="14" font-family="Arial" font-size="8" fill="#888">GPIO Output</text>
  </g>
</svg>
