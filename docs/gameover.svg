<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <rect width="640" height="400" rx="12" fill="url(#bg4)"/>

  <!-- Main OLED Screen -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="384" height="192" rx="8" fill="#000"/>
    <rect x="-8" y="-8" width="400" height="208" rx="12" fill="none" stroke="#333" stroke-width="2"/>

    <g transform="scale(3)">
      <!-- Screen inverted (dark mode) -->
      <rect x="0" y="0" width="128" height="64" fill="#eee"/>

      <!-- GAME OVER text -->
      <text x="64" y="18" text-anchor="middle" font-family="monospace" font-size="10" fill="#000" font-weight="bold">GAME OVER</text>

      <!-- Score display -->
      <text x="64" y="34" text-anchor="middle" font-family="monospace" font-size="7" fill="#333">SCORE: 00864</text>
      <text x="64" y="44" text-anchor="middle" font-family="monospace" font-size="7" fill="#333">HIGH:  04200</text>

      <!-- Sad dino -->
      <g fill="#333">
        <rect x="24" y="50" width="8" height="8"/>
        <rect x="32" y="50" width="4" height="4"/>
        <!-- Eye -->
        <rect x="28" y="50" width="4" height="4" fill="#eee"/>
        <!-- X eyes -->
        <line x1="28" y1="50" x2="32" y2="54" stroke="#e94560" stroke-width="1"/>
        <line x1="32" y1="50" x2="28" y2="54" stroke="#e94560" stroke-width="1"/>
        <!-- Body -->
        <rect x="16" y="54" width="16" height="8"/>
        <rect x="8" y="58" width="16" height="4"/>
        <!-- Legs up! -->
        <rect x="8" y="56" width="6" height="4" fill="#e94560"/>
        <rect x="20" y="56" width="6" height="4" fill="#e94560"/>
      </g>

      <!-- Press to restart -->
      <text x="64" y="62" text-anchor="middle" font-family="monospace" font-size="5" fill="#666">PRESS KEY TO RESTART</text>
    </g>

    <text x="192" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#e94560" opacity="0.7">Game Over Screen (Dark Mode) | 游戏结束画面（暗色模式）</text>
  </g>

  <!-- Secondary OLED during game over -->
  <g transform="translate(460, 120)">
    <rect x="0" y="0" width="160" height="60" rx="4" fill="#000"/>
    <rect x="-4" y="-4" width="168" height="68" rx="6" fill="none" stroke="#333" stroke-width="1.5"/>

    <g transform="scale(1.25)">
      <text x="2" y="8" font-family="monospace" font-size="6" fill="#e94560" font-weight="bold">GAME OVER!</text>
      <text x="2" y="16" font-family="monospace" font-size="6" fill="#a0a0a0">Final Score:864</text>
      <text x="2" y="24" font-family="monospace" font-size="6" fill="#a0a0a0">Press to play</text>
    </g>
  </g>
</svg>
